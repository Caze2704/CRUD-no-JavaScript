<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Unificado</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

</head>
<body>
    <header>
        <h1>Cadastro de Usuário</h1>
        <p class="subtitulo">Projeto CRUD em desenvolvimento com JavaScript, CSS e LocalStorage.</p>
    </header>
    <main>
        <section class="container" id="cadastramento">
            <input type="text" id="inputnome" placeholder="nome">
            <input type="email" name="inputemail" id="inputemail" placeholder="@email">
            <input type="number" name="inputidade" id="inputidade" placeholder="Idade">
            <input type="button" value="Cadastrar" id="cadastro">
        </section>
        <section id="mensagens">
            <div id="msg"></div>
        </section>
        <section class="container" id="lista-usuarios">
            <h2>Usuários cadastrados</h2>
        </section>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
