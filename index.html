<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Unificado</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Cadastro de Usuário</h1>
    </header>
    <main>
        <section class="container" id="cadastramento">
            <input type="text" id="inputnome" placeholder="nome">
            <input type="email" name="inputemail" id="inputemail" placeholder="@email">
            <input type="number" name="inputidade" id="inputidade" placeholder="Idade">
            <input type="button" value="Cadastrar" id="cadastro">
        </section>
        <section id="mensagens">
            <div id="msg"></div>
        </section>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
